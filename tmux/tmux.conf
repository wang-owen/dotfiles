# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# General
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -g history-limit 10000
set -g mouse on
set -sg escape-time 0
set -g focus-events on
set -g renumber-windows on

# Vi mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Image support
set -g allow-passthrough on
set -ga update-environment TERM_PROGRAM

# Windows
bind c new-window -c "#{pane_current_path}"
bind n next-window
bind p previous-window

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Status bar
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#303030,fg=#606060"
set -g status-left "#[fg=#808080,bold] #S "
set -g status-left-length 20
set -g status-right "#[fg=#606060] %H:%M  %Y-%m-%d "
set -g status-right-length 40

set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=#303030,bg=#808080,bold] #I:#W "

set -g pane-border-style "fg=#3a3a3a"
set -g pane-active-border-style "fg=#606060"

set -g message-style "bg=#303030,fg=#808080"

# Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'
